name: harness-intake

# Fires the claude.ai "harness-intake" routine (trig_012Z62wCfRW5Sdm1wxpgCB6s)
# when the `harness` label lands on an issue. If the fire secrets aren't set,
# the routine's daily sweep picks the issue up instead.
# `labeled` only (not `opened`): issues created with the label emit both
# events, which double-fired the routine.
on:
  issues:
    types: [labeled]

jobs:
  fire-routine:
    if: github.event.label.name == 'harness'
    runs-on: ubuntu-latest
    steps:
      - name: Fire harness-intake routine
        env:
          FIRE_URL: ${{ secrets.CLAUDE_ROUTINE_FIRE_URL }}
          FIRE_TOKEN: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
        run: |
          if [ -z "$FIRE_URL" ] || [ -z "$FIRE_TOKEN" ]; then
            echo "CLAUDE_ROUTINE_FIRE_URL / CLAUDE_ROUTINE_TOKEN not configured;" \
                 "issue #${{ github.event.issue.number }} will be picked up by the daily sweep." >&2
            exit 0
          fi
          curl -sS --fail-with-body -X POST "$FIRE_URL" \
            -H "Authorization: Bearer $FIRE_TOKEN" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d '{}'
